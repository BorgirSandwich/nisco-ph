<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="logo.png">
  <title>NISCO-PH</title>
  <style>
    :root {
      --bg: white;
      --text: #c8894a;
      --muted: rgba(255,255,255,0.82);
      --button: #ffffff;
      --buttonText: #1b4f72;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }

    .wrap {
      max-width: 560px;
      width: 100%;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 6rem);
      line-height: 1;
      margin-bottom: 16px;
      font-weight: 800;
    }

    p {
      font-size: clamp(1rem, 3vw, 1.125rem);
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 24px;
    }

    img {
      height: 70%;
    }
    
    a {
      display: inline-block;
      text-decoration: none;
      background: var(--button);
      color: var(--buttonText);
      padding: 14px 22px;
      border-radius: 12px;
      font-weight: 700;
    }

    a:hover {
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="nisco.png" alt="NISCO">
    <p>Coming Soon.</p>
    <a href="home.html">Learn More</a>
  </main>
</body>
</html>
